# .goreleaser.yaml
# Build and release configuration for HotPlex (v2 syntax)
# Note: Docker builds are handled separately in .github/workflows/release.yml
# using docker/build-push-action@v6 for better caching and SBOM support.
version: 2

before:
  hooks:
    - go mod tidy

builds:
  - id: hotplexd
    binary: hotplexd
    main: ./cmd/hotplexd/main.go
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64

archives:
  - name_template: "hotplex_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        formats: [ zip ]
    files:
      - LICENSE
      - README.md
      - README_zh.md
      - INSTALL.md
      - INSTALL_zh.md
      - install.sh

checksum:
  name_template: 'checksums.txt'

snapshot:
  version_template: "{{ incpatch .Tag }}-next"

# Docker builds moved to GitHub Actions (docker/build-push-action@v6)
# Benefits: better caching, SBOM, provenance attestation
# See: .github/workflows/release.yml
