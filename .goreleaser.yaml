# .goreleaser.yaml
# Build and release configuration for HotPlex (v2 syntax)
version: 2

before:
  hooks:
    - go mod tidy

builds:
  - id: hotplexd
    binary: hotplexd
    main: ./cmd/hotplexd/main.go
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64

archives:
  - name_template: "hotplex_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        formats: [ zip ]
    files:
      - LICENSE
      - README.md
      - README_zh.md

checksum:
  name_template: 'checksums.txt'

snapshot:
  version_template: "{{ incpatch .Tag }}-next"

dockers_v2:
  - id: hotplex
    ids:
      - hotplexd
    images:
      - ghcr.io/hrygo/hotplex
    tags:
      - "{{ .Version }}"
      - latest
    dockerfile: Dockerfile.release
    platforms:
      - linux/amd64
      - linux/arm64
    build_args:
      VERSION: "{{ .Version }}"
      HOST_UID: "1000"
