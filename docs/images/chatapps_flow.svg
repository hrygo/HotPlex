<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 520" width="100%" height="auto" style="display: block;">
  <defs>
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0F172A"/>
      <stop offset="100%" stop-color="#1E293B"/>
    </linearGradient>
    <linearGradient id="primary-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#3B82F6"/>
      <stop offset="100%" stop-color="#8B5CF6"/>
    </linearGradient>
    <linearGradient id="box-grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#334155"/>
      <stop offset="100%" stop-color="#1E293B"/>
    </linearGradient>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="0" dy="6" stdDeviation="4" flood-color="#000000" flood-opacity="0.3"/>
    </filter>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <!-- Arrow markers -->
    <marker id="arrow-magenta" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#D946EF"/>
    </marker>
    <marker id="arrow-blue" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#3B82F6"/>
    </marker>
    <marker id="arrow-green" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#10B981"/>
    </marker>
    <marker id="arrow-gray" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#64748B"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="1000" height="520" fill="url(#bg-grad)"/>

  <!-- Phase Zones -->
  <rect x="40" y="40" width="300" height="440" fill="#334155" opacity="0.15" rx="12" stroke="#475569" stroke-dasharray="4"/>
  <text x="190" y="70" fill="#10B981" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, Roboto, sans-serif" font-size="13" font-weight="600" text-anchor="middle" letter-spacing="1">PHASE 1: REQUEST</text>

  <rect x="360" y="40" width="310" height="440" fill="#334155" opacity="0.15" rx="12" stroke="#475569" stroke-dasharray="4"/>
  <text x="515" y="70" fill="#3B82F6" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, Roboto, sans-serif" font-size="13" font-weight="600" text-anchor="middle" letter-spacing="1">PHASE 2: STREAMING</text>

  <rect x="690" y="40" width="270" height="440" fill="#334155" opacity="0.15" rx="12" stroke="#475569" stroke-dasharray="4"/>
  <text x="825" y="70" fill="#D946EF" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, Roboto, sans-serif" font-size="13" font-weight="600" text-anchor="middle" letter-spacing="1">PHASE 3: FINALIZATION</text>

  <!-- Components -->
  <g filter="url(#shadow)">
    <!-- 1. User Terminal -->
    <g transform="translate(80, 200)">
      <rect width="120" height="120" rx="16" fill="url(#box-grad)" stroke="#475569" stroke-width="1.5"/>
      <circle cx="60" cy="45" r="16" fill="#3B82F6" opacity="0.2"/>
      <path d="M60 29a16 16 0 1 0 0 32 16 16 0 0 0 0-32zm0 28a12 12 0 1 1 0-24 12 12 0 0 1 0 24zm-6 10v6h12v-6c0-3.3-2.7-6-6-6s-6 2.7-6 6z" fill="#94A3B8"/>
      <text x="60" y="90" fill="#F8FAFC" font-family="sans-serif" font-size="13" font-weight="600" text-anchor="middle">User</text>
      <text x="60" y="106" fill="#94A3B8" font-family="sans-serif" font-size="11" text-anchor="middle">Terminal</text>
    </g>

    <!-- 2. Chat Platform -->
    <g transform="translate(260, 200)">
      <rect width="120" height="120" rx="16" fill="url(#box-grad)" stroke="#475569" stroke-width="1.5"/>
      <circle cx="60" cy="45" r="18" fill="#8B5CF6" opacity="0.2"/>
      <path d="M68.5 40a9.5 9.5 0 0 0-18.4-3.2A7.5 7.5 0 0 0 45 49.5a7.5 7.5 0 0 0 7.5 7.5h16a8 8 0 0 0 8-8 8 8 0 0 0-8-9z" fill="#94A3B8"/>
      <text x="60" y="90" fill="#F8FAFC" font-family="sans-serif" font-size="13" font-weight="600" text-anchor="middle">Chat Platform</text>
      <text x="60" y="106" fill="#94A3B8" font-family="sans-serif" font-size="11" text-anchor="middle">Slack / Feishu</text>
    </g>

    <!-- 3. Adapter -->
    <g transform="translate(440, 110)">
      <rect width="120" height="100" rx="16" fill="url(#box-grad)" stroke="#475569" stroke-width="1.5"/>
      <path d="M52 35h16v4H52zm-4 8h24v4H48zm12-16v6h-8v-6zm-4 16v14a4 4 0 0 0 8 0V43z" fill="#10B981"/>
      <text x="60" y="70" fill="#F8FAFC" font-family="sans-serif" font-size="13" font-weight="600" text-anchor="middle">Adapter</text>
      <text x="60" y="86" fill="#94A3B8" font-family="sans-serif" font-size="11" text-anchor="middle">Platform API</text>
    </g>

    <!-- 4. Pipeline -->
    <g transform="translate(440, 310)">
      <rect width="120" height="100" rx="16" fill="url(#box-grad)" stroke="#475569" stroke-width="1.5"/>
      <circle cx="45" cy="42" r="3" fill="#D946EF"/><circle cx="60" cy="42" r="3" fill="#A78BFA"/><circle cx="75" cy="42" r="3" fill="#3B82F6"/>
      <path d="M40 50h40v2H40z" fill="#94A3B8"/>
      <text x="60" y="70" fill="#F8FAFC" font-family="sans-serif" font-size="13" font-weight="600" text-anchor="middle">Pipeline</text>
      <text x="60" y="86" fill="#94A3B8" font-family="sans-serif" font-size="11" text-anchor="middle">RateLimit / Format</text>
    </g>

    <!-- 5. Engine Handler -->
    <g transform="translate(620, 200)">
      <rect width="120" height="120" rx="16" fill="url(#box-grad)" stroke="#475569" stroke-width="1.5"/>
      <path d="M60 25c-8.8 0-16 6.3-16 14 0 4.5 2.5 8.5 6.3 11 1.2.8 2 2.2 2 3.8v2.2h15.4V53.8c0-1.6.8-3 2-3.8 3.8-2.5 6.3-6.5 6.3-11 0-7.7-7.2-14-16-14zm0 33h-10v3c0 1.7 1.3 3 3 3h4c1.7 0 3-1.3 3-3v-3z" fill="#3B82F6"/>
      <text x="60" y="90" fill="#F8FAFC" font-family="sans-serif" font-size="13" font-weight="600" text-anchor="middle">Handler</text>
      <text x="60" y="106" fill="#94A3B8" font-family="sans-serif" font-size="11" text-anchor="middle">Process &amp; Exec</text>
    </g>

    <!-- 6. HotPlex Engine -->
    <g transform="translate(800, 200)">
      <rect width="120" height="120" rx="16" fill="url(#primary-grad)" fill-opacity="0.1" stroke="url(#primary-grad)" stroke-width="2" filter="url(#glow)"/>
      <path d="M54 30l-8 16h6l-4 14 14-18h-8l6-12z" fill="url(#primary-grad)"/>
      <text x="60" y="90" fill="#F8FAFC" font-family="sans-serif" font-size="14" font-weight="700" text-anchor="middle">Engine</text>
      <text x="60" y="106" fill="#CBD5E1" font-family="sans-serif" font-size="11" text-anchor="middle">AI / Logic Core</text>
    </g>
  </g>

  <!-- Connectors -->
  <g fill="none" stroke-width="2" font-family="sans-serif" font-size="11" font-weight="500">
    <!-- User to Platform -->
    <path d="M 200 240 L 250 240" stroke="#10B981" marker-end="url(#arrow-green)"/>
    <text x="225" y="232" fill="#34D399" text-anchor="middle">MSG</text>

    <!-- Platform to Adapter -->
    <path d="M 320 200 Q 320 160 430 160" stroke="#10B981" marker-end="url(#arrow-green)"/>
    <text x="370" y="150" fill="#34D399" text-anchor="middle">Webhook</text>

    <!-- Adapter to Handler -->
    <path d="M 560 160 Q 680 160 680 190" stroke="#10B981" marker-end="url(#arrow-green)"/>
    <text x="620" y="150" fill="#34D399" text-anchor="middle">Handle(msg)</text>

    <!-- Handler to Engine -->
    <path d="M 740 240 L 790 240" stroke="#10B981" marker-end="url(#arrow-green)"/>
    <text x="765" y="232" fill="#34D399" text-anchor="middle">Execute</text>

    <!-- Engine to Handler (Stream) -->
    <path d="M 800 280 L 750 280" stroke="#3B82F6" marker-end="url(#arrow-blue)"/>
    <text x="775" y="272" fill="#60A5FA" text-anchor="middle">Stream</text>

    <!-- Handler to Pipeline -->
    <path d="M 680 320 Q 680 360 570 360" stroke="#3B82F6" marker-end="url(#arrow-blue)"/>
    <text x="620" y="375" fill="#60A5FA" text-anchor="middle">Process()</text>

    <!-- Pipeline to Platform -->
    <path d="M 440 360 Q 320 360 320 320" stroke="#3B82F6" marker-end="url(#arrow-blue)"/>
    <text x="370" y="375" fill="#60A5FA" text-anchor="middle">Update API</text>

    <!-- Platform to User (Visual) -->
    <path d="M 260 280 L 210 280" stroke="#3B82F6" marker-end="url(#arrow-blue)"/>
    <text x="235" y="272" fill="#60A5FA" text-anchor="middle">UI Render</text>
    
    <!-- Finalization Line from Engine direct to Adapter? Let's say Handler to Adapter -->
    <!-- Handler sends Session Stats to Adapter via Pipeline in Phase 3 -->
    <path d="M 620 280 Q 500 280 500 220" stroke="#D946EF" stroke-dasharray="2,2" marker-end="url(#arrow-magenta)"/>
    <text x="560" y="295" fill="#F0ABFC" text-anchor="middle">Final Stats</text>
  </g>
</svg>
