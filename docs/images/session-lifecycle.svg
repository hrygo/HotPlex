<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 480" width="100%" height="auto">
  <defs>
    <!-- Gradients -->
    <linearGradient id="readyGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#E8F5E9"/>
      <stop offset="100%" style="stop-color:#C8E6C9"/>
    </linearGradient>
    <linearGradient id="busyGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FFF8E1"/>
      <stop offset="100%" style="stop-color:#FFECB3"/>
    </linearGradient>
    <linearGradient id="deadGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FFEBEE"/>
      <stop offset="100%" style="stop-color:#FFCDD2"/>
    </linearGradient>
    <linearGradient id="noteGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FFF3E0"/>
      <stop offset="100%" style="stop-color:#FFE0B2"/>
    </linearGradient>

    <!-- Shadow Filter -->
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000" flood-opacity="0.12"/>
    </filter>
    <filter id="glowGreen" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Arrow Markers -->
    <marker id="arrowBlue" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#42A5F5"/>
    </marker>
    <marker id="arrowOrange" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#FFA726"/>
    </marker>
    <marker id="arrowRed" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#EF5350"/>
    </marker>
  </defs>

  <style>
    .state-title { font: bold 14px 'Inter', -apple-system, BlinkMacSystemFont, sans-serif; fill: #37474F; }
    .state-text { font: 500 13px 'Inter', -apple-system, BlinkMacSystemFont, sans-serif; fill: #455A64; }
    .note-text { font: 400 11px 'Inter', -apple-system, BlinkMacSystemFont, sans-serif; fill: #546E7A; }
    .edge-label { font: 500 10px 'Inter', -apple-system, BlinkMacSystemFont, sans-serif; fill: #78909C; }
    .state-rect { rx: 10; ry: 10; filter: url(#shadow); }
    .note-rect { rx: 6; ry: 6; filter: url(#shadow); }
  </style>

  <!-- Start Node -->
  <circle cx="450" cy="30" r="12" fill="#42A5F5" filter="url(#shadow)"/>
  <circle cx="450" cy="30" r="6" fill="white"/>

  <!-- Starting State -->
  <g transform="translate(450, 85)">
    <rect class="state-rect" x="-45" y="-22" width="90" height="44" fill="white" stroke="#42A5F5" stroke-width="2"/>
    <text class="state-text" x="0" y="6" text-anchor="middle">Starting</text>
  </g>

  <!-- Ready State (with note) -->
  <g transform="translate(200, 200)">
    <rect class="state-rect" x="-45" y="-22" width="90" height="44" fill="url(#readyGrad)" stroke="#66BB6A" stroke-width="2"/>
    <text class="state-text" x="0" y="6" text-anchor="middle">Ready</text>
  </g>

  <!-- Ready Note -->
  <g transform="translate(200, 310)">
    <rect class="note-rect" x="-90" y="-35" width="180" height="70" fill="url(#noteGrad)" stroke="#FFB74D" stroke-width="1" stroke-dasharray="4,2"/>
    <text class="note-text" x="0" y="-10" text-anchor="middle">Session waiting for commands</text>
    <text class="note-text" x="0" y="10" text-anchor="middle">stdin/stdout piped and ready</text>
  </g>

  <!-- Busy State -->
  <g transform="translate(450, 320)">
    <rect class="state-rect" x="-45" y="-22" width="90" height="44" fill="url(#busyGrad)" stroke="#FFA726" stroke-width="2"/>
    <text class="state-text" x="0" y="6" text-anchor="middle">Busy</text>
  </g>

  <!-- Busy Note -->
  <g transform="translate(450, 430)">
    <rect class="note-rect" x="-85" y="-30" width="170" height="60" fill="url(#noteGrad)" stroke="#FFB74D" stroke-width="1" stroke-dasharray="4,2"/>
    <text class="note-text" x="0" y="-8" text-anchor="middle">Processing user request</text>
    <text class="note-text" x="0" y="12" text-anchor="middle">Streaming events to client</text>
  </g>

  <!-- Dead State -->
  <g transform="translate(750, 200)">
    <rect class="state-rect" x="-45" y="-22" width="90" height="44" fill="url(#deadGrad)" stroke="#EF5350" stroke-width="2"/>
    <text class="state-text" x="0" y="6" text-anchor="middle">Dead</text>
  </g>

  <!-- End Node -->
  <g transform="translate(750, 320)">
    <circle r="14" fill="none" stroke="#EF5350" stroke-width="2"/>
    <circle r="8" fill="#EF5350"/>
  </g>

  <!-- Connections -->
  <!-- Start to Starting -->
  <path d="M 450 42 L 450 60" stroke="#42A5F5" stroke-width="2" fill="none" marker-end="url(#arrowBlue)"/>
  <text class="edge-label" x="470" y="55">Created</text>

  <!-- Starting to Ready -->
  <path d="M 405 85 Q 300 85 245 175" stroke="#66BB6A" stroke-width="2" fill="none" marker-end="url(#arrowBlue)"/>
  <text class="edge-label" x="310" y="120">CLI Initialized</text>

  <!-- Starting to Dead (Init Failed) -->
  <path d="M 495 85 Q 600 85 705 175" stroke="#EF5350" stroke-width="2" fill="none" marker-end="url(#arrowRed)"/>
  <text class="edge-label" x="620" y="120">Init Failed</text>

  <!-- Ready to Busy -->
  <path d="M 245 200 Q 300 250 405 310" stroke="#FFA726" stroke-width="2" fill="none" marker-end="url(#arrowOrange)"/>
  <text class="edge-label" x="290" y="270">Execute Called</text>

  <!-- Busy to Ready -->
  <path d="M 405 340 Q 340 340 250 225" stroke="#66BB6A" stroke-width="2" fill="none" marker-end="url(#arrowBlue)"/>
  <text class="edge-label" x="300" y="300">Complete</text>

  <!-- Busy to Ready (Timeout) -->
  <path d="M 405 320 Q 340 280 250 215" stroke="#66BB6A" stroke-width="1.5" fill="none" stroke-dasharray="5,3" marker-end="url(#arrowBlue)"/>
  <text class="edge-label" x="280" y="245">Timeout</text>

  <!-- Busy Self-loop -->
  <path d="M 495 310 Q 530 280 530 320 Q 530 360 495 330" stroke="#FFA726" stroke-width="1.5" fill="none" marker-end="url(#arrowOrange)"/>
  <text class="edge-label" x="545" y="320">Multi-turn</text>

  <!-- Dead to End -->
  <path d="M 750 222 L 750 300" stroke="#EF5350" stroke-width="2" fill="none" marker-end="url(#arrowRed)"/>
  <text class="edge-label" x="770" y="265">Cleanup</text>

  <!-- Ready to Note -->
  <path d="M 200 222 L 200 270" stroke="#FFB74D" stroke-width="1" stroke-dasharray="3,2" fill="none"/>

  <!-- Busy to Note -->
  <path d="M 450 342 L 450 395" stroke="#FFB74D" stroke-width="1" stroke-dasharray="3,2" fill="none"/>

  <!-- Legend -->
  <g transform="translate(30, 420)">
    <rect x="0" y="0" width="120" height="50" fill="white" stroke="#E0E0E0" stroke-width="1" rx="6"/>
    <circle cx="20" cy="15" r="6" fill="#42A5F5"/>
    <text class="note-text" x="35" y="19">Start State</text>
    <circle cx="20" cy="38" r="5" fill="#EF5350"/>
    <text class="note-text" x="35" y="42">End State</text>
  </g>
</svg>
