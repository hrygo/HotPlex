# ------------------------------------------------------------------------------
# 🛠️ Common Configurations (YAML Anchors)
# ------------------------------------------------------------------------------
x-hotplex-common: &hotplex-common
  image: ${HOTPLEX_IMAGE:-ghcr.io/hrygo/hotplex:latest}
  init: true # Proper PID 1 signal handling
  environment: &common-env
    HOST_UID: ${HOST_UID:-1000}
    # ─────────────────────────────────────────────────────────────────
    # Proxy Configuration (OPTIONAL)
    # ─────────────────────────────────────────────────────────────────
    ANTHROPIC_BASE_URL: http://host.docker.internal:15721
    HTTP_PROXY: http://host.docker.internal:7897
    HTTPS_PROXY: http://host.docker.internal:7897
    NO_PROXY: localhost,127.0.0.1,host.docker.internal
    # ─────────────────────────────────────────────────────────────────
    # Git Identity Defaults
    # ─────────────────────────────────────────────────────────────────
    GIT_USER_NAME: ${GIT_USER_NAME:-HotPlexBot}
    GIT_USER_EMAIL: ${GIT_USER_EMAIL:-noreply@hotplex.dev}
    # ─────────────────────────────────────────────────────────────────
    # ChatApp Core Paths (Standardized for Container)
    # ─────────────────────────────────────────────────────────────────
    HOTPLEX_DATA_ROOT: /home/hotplex/.hotplex
    HOTPLEX_PROJECTS_DIR: /home/hotplex/projects
    HOTPLEX_MESSAGE_STORE_SQLITE_PATH: /home/hotplex/.hotplex/chatapp_messages.db
    HOTPLEX_CHATAPPS_CONFIG_DIR: /home/hotplex/configs/chatapps
  extra_hosts:
    - "host.docker.internal:host-gateway"
  cap_drop: [ NET_RAW, NET_ADMIN ]
  security_opt: [ no-new-privileges:true ]
  healthcheck: &common-healthcheck
    test: [ "CMD", "wget", "-q", "--spider", "http://localhost:8080/health" ]
    interval: 30s
    timeout: 10s
    retries: 3
    start_period: 60s
  logging: &common-logging
    driver: json-file
    options: { max-size: "10m", max-file: "3" }
  deploy: &common-deploy
    resources:
      limits: { memory: 2G, cpus: '2.0' }
      reservations: { memory: 512M, cpus: '0.25' }
  restart: unless-stopped

# ------------------------------------------------------------------------------
# 🛠️ Shared Service Template (Service-Level DRY)
# ------------------------------------------------------------------------------
services:
  hotplex-base:
    <<: *hotplex-common
    volumes:
      # Shared Resources (Common to all instances)
      - ${HOTPLEX_HOST_CONFIGS_DIR:-~/.hotplex/configs}:/home/hotplex/configs:rw
      - ~/.claude:/home/hotplex/.claude_seed:ro
      - matrix-go-mod:/home/hotplex/go/pkg/mod:rw
      - matrix-go-build:/home/hotplex/.cache/go-build:rw
