<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="100%" height="100%">
  <defs>
    <linearGradient id="tail-stream-1" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#FF7B72" /> <stop offset="100%" stop-color="#FFA657" />
    </linearGradient>
    <linearGradient id="tail-stream-2" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#FFA657" />
      <stop offset="100%" stop-color="#D2A8FF" /> </linearGradient>
    <linearGradient id="tail-stream-3" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#FF7B72" />
      <stop offset="100%" stop-color="#58A6FF" /> </linearGradient>
    
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <rect width="400" height="400" rx="36" fill="#0D1117" stroke="#30363D" stroke-width="2"/>

  <g fill="none" stroke-width="14" stroke-linecap="round" filter="url(#glow)">
    <path d="M 190 180 C 260 110, 340 130, 310 200" stroke="url(#tail-stream-3)" opacity="0.85"/>
    <path d="M 170 200 C 250 160, 350 210, 290 270" stroke="url(#tail-stream-1)" />
    <path d="M 150 220 C 220 230, 310 290, 240 330" stroke="url(#tail-stream-2)" opacity="0.85"/>
  </g>

  <g transform="translate(70, 130)">
    <polygon points="30,0 60,40 20,50" fill="#FFA657" />
    <polygon points="110,0 120,50 80,40" fill="#FF7B72" />
    
    <polygon points="20,50 70,120 120,50 70,35" fill="#21262D" stroke="#30363D" stroke-width="2"/>
    
    <polygon points="70,120 45,70 95,70" fill="#FF7B72" opacity="0.9"/>
    
    <polygon points="75,55 95,50 85,65" fill="#58A6FF" filter="url(#glow)"/>
    <polygon points="65,55 45,50 55,65" fill="#58A6FF" filter="url(#glow)"/>
    
    <circle cx="70" cy="120" r="5" fill="#E6EDF3" />
  </g>

  <text x="200" y="360" font-family="-apple-system, BlinkMacSystemFont, monospace" font-size="36" font-weight="900" fill="#E6EDF3" text-anchor="middle" letter-spacing="2">
    hot<tspan fill="#FF7B72">plex</tspan>
  </text>
</svg>
