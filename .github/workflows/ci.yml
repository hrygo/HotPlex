name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test-unit:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          cache: true

      - name: Install dependencies
        run: go mod download

      - name: Setup Mock Claude CLI
        run: |
          mkdir -p $HOME/.local/bin
          echo '#!/bin/bash' > $HOME/.local/bin/claude
          echo 'echo "claude version 0.0.0-mock"' >> $HOME/.local/bin/claude
          chmod +x $HOME/.local/bin/claude
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Run Unit Tests
        run: make test-unit

  test-integration:
    name: Integration Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          cache: true

      - name: Install dependencies
        run: go mod download

      - name: Setup Mock Claude CLI
         # Reuse same setup
        run: |
          mkdir -p $HOME/.local/bin
          echo '#!/bin/bash' > $HOME/.local/bin/claude
          echo 'echo "claude version 0.0.0-mock"' >> $HOME/.local/bin/claude
          chmod +x $HOME/.local/bin/claude
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Run Integration Tests
        run: make test-integration

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          cache: false

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest
          args: --timeout=5m
