name: pr-checks

on:
  pull_request:
    types: [opened, edited, synchronize, reopened]

jobs:
  gate:
    name: PR Quality Gate
    permissions:
      statuses: write  # 使用工作流权限而非用户 token
    runs-on: ubuntu-latest
    steps:
      - name: Validate PR
        id: validate
        shell: bash
        env:
          PR_BODY: ${{ github.event.pull_request.body }}
          HEAD_REF: ${{ github.head_ref }}
        run: |
          # 1. Branch Naming Check
          REGEX="^(feat|fix|refactor|docs|chore|test)/([0-9]+-)?.*$"
          if [[ ! "$HEAD_REF" =~ $REGEX ]]; then
            echo "branch_error=Format: <type>/[<id>-]<desc> (e.g. feat/1-login)" >> $GITHUB_OUTPUT
          fi
          
          # 2. Issue Link Check
          if ! echo "$PR_BODY" | grep -Eiq "(resolves|fixes|closes|refs|fix)\s+#([0-9]+)"; then
            echo "issue_error=Missing issue link (e.g. Resolves #1 or Refs #1)" >> $GITHUB_OUTPUT
          fi

      - name: Report Status
        uses: actions/github-script@v7
        env:
          BRANCH_ERR: ${{ steps.validate.outputs.branch_error }}
          ISSUE_ERR: ${{ steps.validate.outputs.issue_error }}
        with:
          script: |
            const { owner, repo } = context.repo;
            const sha = context.payload.pull_request.head.sha;
            
            const branchErr = process.env.BRANCH_ERR;
            const issueErr = process.env.ISSUE_ERR;
            
            const reports = [
              { context: 'pr-checks/branch-naming', state: branchErr ? 'failure' : 'success', desc: branchErr || 'Branch naming correct' },
              { context: 'pr-checks/issue-link', state: issueErr ? 'failure' : 'success', desc: issueErr || 'Issue link found' }
            ];
            
            for (const r of reports) {
              try {
                await github.rest.repos.createCommitStatus({
                  owner, repo, sha,
                  state: r.state,
                  context: r.context,
                  description: r.desc,
                  target_url: `https://github.com/${owner}/${repo}/actions/runs/${context.runId}`
                });
              } catch (e) {
                console.log(`Failed to update status for ${r.context}: ${e.message}`);
              }
            }
            
            if (branchErr || issueErr) process.exit(1);
