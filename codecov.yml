codecov:
  require_ci_to_pass: yes

coverage:
  precision: 2
  round: down
  range: "40...100"

  # 容忍 PR 阶段的小幅波动，主干阶段严格执行
  # PR: 允许覆盖率降低 1~2%（测试跳过、平台差异等合理波动）
  # Main: 覆盖率不允许降低，threshold: 0%
  status:
    project:
      default:
        target: 50%
        threshold: 1%
      security:
        target: 85%
        threshold: 1%
        paths:
          - "internal/security/"
      engine:
        target: 75%
        threshold: 1%
        paths:
          - "internal/gateway/"
      protocol:
        target: 85%
        threshold: 1%
        paths:
          - "pkg/aep/"
          - "pkg/events/"
      config:
        target: 70%
        threshold: 1%
        paths:
          - "internal/config/"
      session:
        target: 70%
        threshold: 1%
        paths:
          - "internal/session/"
      worker:
        target: 60%
        threshold: 1%
        paths:
          - "internal/worker/"
      messaging:
        target: 50%
        threshold: 1%
        paths:
          - "internal/messaging/"

parsers:
  gcov:
    branch_discovery: yes

comment:
  layout: "header, diff, flags, files"
  behavior: default
  require_changes: no
