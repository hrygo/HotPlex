<svg width="1400" height="1200" viewBox="0 0 1400 1200" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- 全局自定义字体与滤镜 -->
  <defs>
    <style type="text/css">
      @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&amp;display=swap');
      .text-base { font-family: 'Inter', system-ui, sans-serif; }
      .title { font-weight: 800; fill: #FFFFFF; }
      .desc { font-weight: 400; fill: #9CA3AF; font-size: 12px; }
      .tier-label { font-weight: 800; font-size: 14px; letter-spacing: 2px; }
    </style>
    <filter id="card-shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feFlood flood-color="#000000" flood-opacity="0.5" result="color" />
      <feComposite in="color" in2="blur" operator="in" result="shadow" />
      <feOffset dx="0" dy="4" in="shadow" />
      <feComposite in="SourceGraphic" operator="over" />
    </filter>
    <linearGradient id="grad-oracle" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#7C3AED"/><stop offset="100%" stop-color="#4C1D95"/></linearGradient>
    <linearGradient id="grad-plan" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#F59E0B"/><stop offset="100%" stop-color="#B45309"/></linearGradient>
    <linearGradient id="grad-exec" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#10B981"/><stop offset="100%" stop-color="#064E3B"/></linearGradient>
    <linearGradient id="grad-tool" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#3B82F6"/><stop offset="100%" stop-color="#1E3A8A"/></linearGradient>
    <linearGradient id="grad-infra" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#4B5563"/><stop offset="100%" stop-color="#111827"/></linearGradient>
  </defs>

  <!-- 背景 -->
  <rect width="1400" height="1200" rx="32" fill="#0F1117" />
  
  <!-- 标题 -->
  <text x="700" y="80" class="text-base title" font-size="36" text-anchor="middle">OPENCODE AGENT 分层架构全景图</text>
  <rect x="620" y="100" width="160" height="4" fill="#7C3AED" rx="2" />

  <!-- ========================================== -->
  <!-- TIER 1: CORE INTELLECT (STRATEGY & ANALYSIS) -->
  <!-- ========================================== -->
  <g transform="translate(100, 160)">
    <rect x="-40" y="-20" width="1280" height="240" rx="24" fill="#1A1D25" stroke="#374151" stroke-width="1.5" stroke-dasharray="8 4" />
    <text x="-15" y="10" class="text-base tier-label" fill="#7C3AED">TIER 1: CORE INTELLECT (核心决策层)</text>
    
    <!-- Oracle Card -->
    <g transform="translate(0, 40)" filter="url(#card-shadow)">
      <rect width="380" height="140" rx="16" fill="#262B36" stroke="url(#grad-oracle)" stroke-width="2" />
      <text x="20" y="35" class="text-base title" font-size="20">Oracle (总顾问)</text>
      <text x="20" y="65" class="text-base desc">
        <tspan x="20" dy="0">架构设计、复杂调试、安全/性能分析</tspan>
        <tspan x="20" dy="20">多系统权衡。卡住时咨询的高智商 AI。</tspan>
      </text>
      <text x="20" y="115" class="text-base" font-size="11" fill="#BB86FC" font-weight="700">Model: Gemini 3.1 Pro (High)</text>
    </g>

    <!-- Metis Card -->
    <g transform="translate(410, 40)" filter="url(#card-shadow)">
      <rect width="380" height="140" rx="16" fill="#262B36" stroke="#BB86FC" stroke-width="1" />
      <text x="20" y="35" class="text-base title" font-size="20">Metis (分析师)</text>
      <text x="20" y="65" class="text-base desc">
        <tspan x="20" dy="0">预规划分析、识别隐藏意图、消除歧义</tspan>
        <tspan x="20" dy="20">任务可行性分析，防范 AI 失败点。</tspan>
      </text>
      <text x="20" y="115" class="text-base" font-size="11" fill="#BB86FC" font-weight="700">Model: Gemini 3.1 Pro (High)</text>
    </g>

    <!-- Atlas Card -->
    <g transform="translate(820, 40)" filter="url(#card-shadow)">
      <rect width="380" height="140" rx="16" fill="#262B36" stroke="#48CAE4" stroke-width="1" />
      <text x="20" y="35" class="text-base title" font-size="20">Atlas (知识库)</text>
      <text x="20" y="65" class="text-base desc">
        <tspan x="20" dy="0">项目知识图谱构建与维护。文档整理、</tspan>
        <tspan x="20" dy="20">技术标准索引，为其它 Agent 提供 Context。</tspan>
      </text>
      <text x="20" y="115" class="text-base" font-size="11" fill="#4B9CD3" font-weight="700">Model: Gemini 3-Flash</text>
    </g>
  </g>

  <!-- ========================================== -->
  <!-- TIER 1.5: ORCHESTRATION (PLANNING & QA)    -->
  <!-- ========================================== -->
  <g transform="translate(100, 430)">
    <rect x="-40" y="-20" width="1280" height="200" rx="24" fill="#1A1D25" stroke="#F59E0B" stroke-width="1.5" opacity="0.8" />
    <text x="-15" y="10" class="text-base tier-label" fill="#F59E0B">PLANNING &amp; ORCHESTRATION (任务编排层)</text>
    
    <!-- Prometheus & Momus Group -->
    <g transform="translate(0, 40)">
      <rect width="585" height="110" rx="16" fill="#2D251A" stroke="#F59E0B" stroke-width="1" />
      <text x="20" y="35" class="text-base title" font-size="18" fill="#F59E0B">Prometheus (计划制定)</text>
      <text x="20" y="65" class="text-base desc">将复杂任务分解为可执行步骤、生成线性或并行工作计划。</text>
      <text x="20" y="90" class="text-base" font-size="11" fill="#FFB74D" font-weight="700">Model: GLM-5</text>
    </g>

    <g transform="translate(615, 40)">
      <rect width="585" height="110" rx="16" fill="#2D1A1A" stroke="#EF4444" stroke-width="1" />
      <text x="20" y="35" class="text-base title" font-size="18" fill="#EF4444">Momus (计划审查)</text>
      <text x="20" y="65" class="text-base desc">评估计划清晰度、可验证性与完整性。执行前的最后质量关卡。</text>
      <text x="20" y="90" class="text-base" font-size="11" fill="#F87171" font-weight="700">Model: GLM-5</text>
    </g>
  </g>

  <!-- ========================================== -->
  <!-- TIER 2: SPECIALIZED TOOLS (EXECUTION)      -->
  <!-- ========================================== -->
  <g transform="translate(100, 660)">
    <rect x="-40" y="-20" width="1280" height="280" rx="24" fill="#1A1D25" stroke="#3B82F6" stroke-width="1.5" />
    <text x="-15" y="10" class="text-base tier-label" fill="#3B82F6">TIER 2 &amp; EXECUTION: SPECIALIZED TOOLS (执行与工具层)</text>
    
    <!-- Sisyphus - Main coding -->
    <g transform="translate(0, 40)" filter="url(#card-shadow)">
      <rect width="380" height="180" rx="16" fill="#1E293B" stroke="#10B981" stroke-width="2" />
      <text x="20" y="35" class="text-base title" font-size="22" fill="#10B981">Sisyphus (主力编码)</text>
      <text x="20" y="65" class="text-base desc">
        <tspan x="20" dy="0">日常编码搬砖、代码执行、委托、验证</tspan>
        <tspan x="20" dy="20">并交付成果。极速响应的代码开发伙伴。</tspan>
      </text>
      <rect x="20" y="115" width="340" height="40" rx="8" fill="#064E3B" opacity="0.3" />
      <text x="35" y="140" class="text-base" font-size="11" fill="#6EE7B7" font-weight="800">Model: MiniMax-M2.5-Highspeed</text>
    </g>

    <!-- Tool Grid -->
    <g transform="translate(410, 40)">
      <!-- Tool Row 1 -->
      <rect width="250" height="80" rx="12" fill="#262B36" stroke="#3B82F6" stroke-opacity="0.5" />
      <text x="15" y="25" class="text-base title" font-size="14">Frontend-UI-UX</text>
      <text x="15" y="45" class="text-base desc">UI/UX设计、动画、视觉工程</text>
      <text x="15" y="65" font-family="monospace" font-size="9" fill="#9D4EDD">Gemini 3.1 Pro (Vision)</text>

      <rect x="265" width="250" height="80" rx="12" fill="#262B36" stroke="#3B82F6" stroke-opacity="0.5" />
      <text x="280" y="25" class="text-base title" font-size="14">Explore (扫库)</text>
      <text x="280" y="45" class="text-base desc">内部模式发现、模块依赖理解</text>
      <text x="280" y="65" font-family="monospace" font-size="9" fill="#10B981">MiniMax-M2.5-HS</text>

      <rect x="530" width="250" height="80" rx="12" fill="#262B36" stroke="#3B82F6" stroke-opacity="0.5" />
      <text x="545" y="25" class="text-base title" font-size="14">Librarian (查档)</text>
      <text x="545" y="45" class="text-base desc">外部 API、OSS 文档、最佳实践</text>
      <text x="545" y="65" font-family="monospace" font-size="9" fill="#10B981">MiniMax-M2.5-HS</text>

      <!-- Tool Row 2 -->
      <rect y="100" width="250" height="80" rx="12" fill="#262B36" stroke="#3B82F6" stroke-opacity="0.5" />
      <text x="15" y="125" class="text-base title" font-size="14">Doc-Writer</text>
      <text x="15" y="145" class="text-base desc">Markdown 撰写、技术文档优化</text>
      <text x="15" y="165" font-family="monospace" font-size="9" fill="#10B981">MiniMax-M2.5-HS</text>

      <rect x="265" y="100" width="515" height="80" rx="12" fill="#262B36" stroke="#A855F7" stroke-opacity="0.5" />
      <text x="280" y="125" class="text-base title" font-size="14">Multimodal-Looker</text>
      <text x="280" y="145" class="text-base desc">截图、图表、PDF 深度分析与理解。具备完整视觉能力。</text>
      <text x="280" y="165" font-family="monospace" font-size="9" fill="#A855F7">GLM-4.6V (Vision)</text>
    </g>
  </g>

  <!-- ========================================== -->
  <!-- TIER 4: INFRASTRUCTURE (MODELS)           -->
  <!-- ========================================== -->
  <g transform="translate(100, 970)">
    <rect x="-40" y="-20" width="1280" height="180" rx="24" fill="url(#grad-infra)" stroke="#4B5563" />
    <text x="-15" y="10" class="text-base tier-label" fill="#9CA3AF">INFRASTRUCTURE LAYER (模型基座层)</text>
    
    <g transform="translate(20, 40)">
      <!-- Gemini Block -->
      <rect width="380" height="100" rx="12" fill="#111827" stroke="#9D4EDD" stroke-width="1.5" />
      <text x="20" y="35" class="text-base title" font-size="16" fill="#BB86FC">Google Gemini Series</text>
      <text x="20" y="60" class="text-base desc">1M Context Window • Multi-modal • Strong Logic</text>
      <text x="20" y="80" class="text-base" font-size="10" fill="#9D4EDD">Capabilities: Pro (High Reasoning) / Flash (Knowledge)</text>

      <!-- Zhipu Block -->
      <rect x="410" width="380" height="100" rx="12" fill="#111827" stroke="#F59E0B" stroke-width="1.5" />
      <text x="430" y="35" class="text-base title" font-size="16" fill="#FFB74D">Zhipu AI (GLM)</text>
      <text x="430" y="60" class="text-base desc">Strong Coding benchmarks • Balanced Orchestration</text>
      <text x="430" y="80" class="text-base" font-size="10" fill="#F59E0B">Capabilities: GLM-5 (Planner) / 4.6V (Vision) / 4.5-Flash</text>

      <!-- MiniMax Block -->
      <rect x="820" width="380" height="100" rx="12" fill="#111827" stroke="#10B981" stroke-width="1.5" />
      <text x="840" y="35" class="text-base title" font-size="16" fill="#6EE7B7">MiniMax M2.5</text>
      <text x="840" y="60" class="text-base desc">State-of-the-art Speed • Cost-effective Execution</text>
      <text x="840" y="80" class="text-base" font-size="10" fill="#10B981">Capabilities: Highspeed Coding / Large Scale Text Processing</text>
    </g>
  </g>

  <!-- 连接箭头 (Implicit flow) -->
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#4B5563" />
    </marker>
  </defs>
  <!-- Vertical Flow Lines -->
  <path d="M700 400 V430" stroke="#4B5563" stroke-width="2" marker-end="url(#arrow)" />
  <path d="M700 600 V660" stroke="#4B5563" stroke-width="2" marker-end="url(#arrow)" />
  <path d="M700 940 V970" stroke="#4B5563" stroke-width="2" marker-end="url(#arrow)" />

  <!-- Footer -->
  <text x="700" y="1175" class="text-base desc" text-anchor="middle">© 2026 OpenCode Platform | Configuration Version 1.2.5 | Architecture Optimized for Agentic Workflow</text>
</svg>
