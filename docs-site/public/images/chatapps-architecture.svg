<svg width="1200" height="1000" viewBox="0 0 1200 1000" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Global Definitions -->
  <defs>
    <filter id="glass-shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur" />
      <feFlood flood-color="#000000" flood-opacity="0.1" result="color" />
      <feComposite in="color" in2="blur" operator="in" />
      <feOffset dx="0" dy="6" />
      <feComposite in="SourceGraphic" operator="over" />
    </filter>

    <linearGradient id="grad-main" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F8FAFC" />
      <stop offset="100%" stop-color="#F1F5F9" />
    </linearGradient>

    <linearGradient id="card-grad-blue" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3B82F6" />
      <stop offset="100%" stop-color="#2563EB" />
    </linearGradient>

    <linearGradient id="card-grad-emerald" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#10B981" />
      <stop offset="100%" stop-color="#059669" />
    </linearGradient>

    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#E2E8F0" stroke-width="0.5" />
    </pattern>

    <!-- Standard Typography -->
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&amp;family=JetBrains+Mono:wght@500&amp;display=swap');
      .text-title { font: 900 36px 'Inter', sans-serif; fill: #0f172a; }
      .text-sub { font: 500 18px 'Inter', sans-serif; fill: #64748b; }
      .zone-label { font: 800 11px 'Inter', sans-serif; fill: #94a3b8; letter-spacing: 1px; text-transform: uppercase; }
      .node-heading { font: 700 16px 'Inter', sans-serif; fill: #0f172a; }
      .node-body { font: 400 12px 'Inter', sans-serif; fill: #64748b; }
      .code-display { font: 500 11px 'JetBrains Mono', monospace; fill: #0f172a; }
    </style>

    <!-- UNIFIED ARROWHEADS -->
    <marker id="arrow-blue" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#3B82F6" />
    </marker>
    <marker id="arrow-emerald" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#10B981" />
    </marker>
  </defs>

  <!-- Background -->
  <rect width="1200" height="1000" rx="24" fill="url(#grad-main)" />
  <rect width="1200" height="1000" rx="24" fill="url(#grid)" />

  <!-- Title Section -->
  <g transform="translate(600, 60)">
    <text text-anchor="middle" class="text-title">HotPlex ChatApps Architecture</text>
    <text y="35" text-anchor="middle" class="text-sub">Standardized Bidirectional AI Gateway Flow</text>
  </g>

  <!-- ZONE 1 EXTERNAL -->
  <g transform="translate(60, 140)">
    <rect width="1080" height="160" rx="24" fill="white" fill-opacity="0.6" stroke="#E2E8F0" stroke-width="1" />
    <text x="20" y="25" class="zone-label" fill="#94a3b8">EXTERNAL CHAT ECOSYSTEM</text>
    <g transform="translate(40, 55)">
      <rect width="230" height="85" rx="16" fill="white" filter="url(#glass-shadow)" />
      <rect x="15" y="17" width="50" height="50" rx="12" fill="#E0F2FE" />
      <text x="80" y="40" class="node-heading" fill="#0F172A">DingTalk</text>
      <text x="80" y="60" class="node-body">Enterprise Callback</text>

      <rect x="250" width="230" height="85" rx="16" fill="white" filter="url(#glass-shadow)" />
      <rect x="265" y="17" width="50" height="50" rx="12" fill="#F0F9FF" />
      <text x="330" y="40" class="node-heading" fill="#0F172A">Telegram</text>
      <text x="330" y="60" class="node-body">Bot API / Webhook</text>

      <rect x="500" width="230" height="85" rx="16" fill="white" filter="url(#glass-shadow)" />
      <rect x="515" y="17" width="50" height="50" rx="12" fill="#FDF2F8" />
      <text x="580" y="40" class="node-heading" fill="#0F172A">Slack</text>
      <text x="580" y="60" class="node-body">Socket Mode</text>

      <rect x="750" width="230" height="85" rx="16" fill="white" filter="url(#glass-shadow)" />
      <rect x="765" y="17" width="50" height="50" rx="12" fill="#EEF2FF" />
      <text x="830" y="40" class="node-heading" fill="#0F172A">Discord</text>
      <text x="830" y="60" class="node-body">Gateway / Bot</text>
    </g>
  </g>

  <!-- ZONE 2 LOGICAL -->
  <g transform="translate(60, 380)">
    <rect width="1080" height="300" rx="24" fill="white" filter="url(#glass-shadow)" stroke="#BFDBFE" stroke-width="1.5" />
    <text x="20" y="25" class="zone-label" fill="#3B82F6">LOGICAL ADAPTER LAYER</text>
    <g transform="translate(30, 45)">
      <rect width="360" height="230" rx="20" fill="url(#card-grad-blue)" />
      <text x="180" y="45" class="node-heading" font-size="22" fill="white" text-anchor="middle">Adapter Manager</text>
      <rect x="40" y="65" width="280" height="1" fill="white" opacity="0.3" />
      <g transform="translate(45, 100)" class="node-body" fill="white">
        <text>• Unified Payload Dispatcher</text>
        <text y="30">• Async Event Broadcast</text>
        <text y="60">• Platform Lifecycle Hooks</text>
        <text y="90">• Session-to-User Mapping</text>
      </g>
    </g>
    <g transform="translate(415, 45)">
      <rect width="300" height="105" rx="16" fill="#F8FAFC" stroke="#E2E8F0" />
      <text x="20" y="35" class="node-heading">Telegram Integration</text>
      <text x="20" y="60" class="node-body">• Bot API Communication</text>
      <text x="20" y="78" class="node-body">• Markdown Formatting</text>
      <rect y="125" width="300" height="105" rx="16" fill="#F8FAFC" stroke="#E2E8F0" />
      <text x="20" y="160" class="node-heading">DingTalk Integration</text>
      <text x="20" y="185" class="node-body">• Callback Verification</text>
      <text x="20" y="203" class="node-body">• Message Splitting</text>
      <rect x="325" y="0" width="310" height="230" rx="16" fill="#F1F5F9" stroke="#94A3B8" stroke-dasharray="6 4" />
      <text x="480" y="40" class="node-heading" text-anchor="middle" fill="#475569">ChatAdapter Interface</text>
      <g transform="translate(350, 85)" class="code-display">
        <text>Platform() string</text>
        <text y="28">Start(ctx) error</text>
        <text y="56">SendMessage() error</text>
        <text y="84">HandleMessage() error</text>
      </g>
    </g>
  </g>

  <!-- ZONE 3 CORE -->
  <g transform="translate(60, 750)">
    <rect width="1080" height="180" rx="24" fill="white" stroke="#6EE7B7" stroke-width="1.5" />
    <text x="20" y="25" class="zone-label" fill="#059669">CORE ENGINE SYSTEM</text>
    <g transform="translate(30, 40)">
      <rect width="320" height="110" rx="20" fill="#F0FDF4" stroke="#10B981" stroke-width="1" />
      <text x="160" y="35" class="node-heading" font-size="18" fill="#065F46" text-anchor="middle">Session Manager</text>
      <rect x="40" y="55" width="240" height="30" rx="8" fill="white" stroke="#10B981" />
      <text x="160" y="75" class="node-heading" font-size="11" fill="#1E293B" text-anchor="middle">UserID ↔ WorkDir</text>
    </g>
    <g transform="translate(370, 40)">
      <rect width="450" height="110" rx="20" fill="url(#card-grad-emerald)" />
      <text x="225" y="35" class="node-heading" font-size="22" fill="white" text-anchor="middle">Execution Core</text>
      <g transform="translate(25, 55)">
        <rect width="125" height="40" rx="10" fill="white" fill-opacity="0.15" stroke="white" stroke-opacity="0.5" />
        <text x="62" y="25" class="zone-label" fill="white" text-anchor="middle">Claude Code</text>
        <rect x="140" width="125" height="40" rx="10" fill="white" fill-opacity="0.15" stroke="white" stroke-opacity="0.5" />
        <text x="202" y="25" class="zone-label" fill="white" text-anchor="middle">OpenCode</text>
        <rect x="280" width="115" height="40" rx="10" fill="white" fill-opacity="0.15" stroke="white" stroke-opacity="0.5" />
        <text x="337" y="25" class="zone-label" fill="white" text-anchor="middle">Hooks API</text>
      </g>
    </g>
    <g transform="translate(840, 40)">
      <rect width="210" height="110" rx="20" fill="#F8FAFC" stroke="#E2E8F0" />
      <text x="105" y="25" class="zone-label" fill="#475569" text-anchor="middle">Event Stream (SSE)</text>
      <g transform="translate(30, 40)" class="node-body" font-weight="600" fill="#4B5563">
        <circle cx="5" cy="10" r="4" fill="#3B82F6" />
        <text x="18" y="14">Reasoning / Progress</text>
        <circle cx="5" cy="35" r="4" fill="#F59E0B" />
        <text x="18" y="39">Tool Execution</text>
      </g>
    </g>
  </g>

  <!-- ========================================== -->
  <!-- UNIFIED CONNECTORS (ALL SOLID FLOWS)       -->
  <!-- ========================================== -->
  
  <!-- 1. INBOUND: External -> Adapter (SOLID EMERALD) -->
  <path d="M220 300 V380" stroke="#10B981" stroke-width="3" marker-end="url(#arrow-emerald)" />
  <g transform="translate(235, 325)">
    <rect width="110" height="30" rx="15" fill="white" stroke="#10B981" stroke-width="1.5" />
    <text x="55" y="19" font-family="Inter" font-size="10" font-weight="900" fill="#065F46" text-anchor="middle">USER MESSAGE</text>
  </g>

  <!-- 2. OUTBOUND: Adapter -> External (SOLID BLUE) -->
  <path d="M1000 380 V300" stroke="#3B82F6" stroke-width="3" marker-end="url(#arrow-blue)" />
  <g transform="translate(875, 325)">
    <rect width="110" height="30" rx="15" fill="white" stroke="#3B82F6" stroke-width="1.5" />
    <text x="55" y="19" font-family="Inter" font-size="10" font-weight="900" fill="#1D4ED8" text-anchor="middle">BOT RESPONSE</text>
  </g>

  <!-- 3. EXECUTION: Adapter -> Engine (SOLID EMERALD) -->
  <path d="M240 680 V750" stroke="#10B981" stroke-width="3" marker-end="url(#arrow-emerald)" />
  <g transform="translate(255, 700)">
    <rect width="110" height="30" rx="15" fill="white" stroke="#10B981" stroke-width="1.5" />
    <text x="55" y="19" font-family="Inter" font-size="10" font-weight="900" fill="#065F46" text-anchor="middle">ENGINE CALL</text>
  </g>

  <!-- 4. STREAMING: Engine -> Adapter (SOLID BLUE) -->
  <path d="M960 750 V680" stroke="#3B82F6" stroke-width="3" marker-end="url(#arrow-blue)" />
  <g transform="translate(835, 700)">
    <rect width="110" height="30" rx="15" fill="white" stroke="#3B82F6" stroke-width="1.5" />
    <text x="55" y="19" font-family="Inter" font-size="10" font-weight="900" fill="#1D4ED8" text-anchor="middle">SSE STREAM</text>
  </g>

  <!-- Footer -->
  <text x="600" y="980" class="node-body" fill="#94A3B8" text-anchor="middle">HotPlex ChatApps Adapter Framework | Standardized Multi-Platform Control Plane</text>

</svg>
