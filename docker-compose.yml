# HotPlex Docker Compose Deployment
# Start with: docker compose up -d
#
# Architecture Notes:
# - YAML Anchors (&anchor / *alias / <<: merge) reduce configuration duplication
# - Bot 01 builds the image; Bot 02 reuses it (same image, different env)
# - Each bot reads its own .env file for isolated paths (projects dir, gitconfig)

# Shared configuration using YAML anchors
x-hotplex-common: &hotplex-common
  environment:
    - HOST_UID=${HOST_UID:-1000}
    - ANTHROPIC_BASE_URL=http://host.docker.internal:15721
    - HTTP_PROXY=http://host.docker.internal:7897
    - HTTPS_PROXY=http://host.docker.internal:7897
    - NO_PROXY=localhost,127.0.0.1,host.docker.internal
  volumes: &hotplex-volumes
    - ${HOME}/.hotplex:/home/hotplex/.hotplex:rw        # Message DB, configs
    - ${HOME}/.claude:/home/hotplex/.claude:rw          # Session state
    - ${HOME}/.claude/settings.json:/home/hotplex/.claude/settings.json:ro
    - hotplex-go-mod:/home/hotplex/go/pkg/mod:rw       # Go module cache
    - hotplex-go-build:/home/hotplex/.cache/go-build:rw # Go build cache
    - ${HOTPLEX_PROJECTS_DIR}:/home/hotplex/projects:rw # Project workspace
    - ${HOTPLEX_GITCONFIG}:/home/hotplex/.gitconfig:ro  # Git config (immutable)
  extra_hosts:
    - "host.docker.internal:host-gateway"
  healthcheck:
    test: [ "CMD", "wget", "-q", "--spider", "http://localhost:8080/health" ]
    interval: 30s
    timeout: 10s
    retries: 3
  deploy:
    resources:
      limits:
        memory: 2G
        cpus: '2.0'
  restart: unless-stopped

services:
  # ---------------------------------------------------------
  # Bot 01: Primary Bot (builds image + runs)
  # env file: .env
  # ---------------------------------------------------------
  hotplex:
    build:
      context: .
      args:
        - HOST_UID=${HOST_UID:-1000}
        - VERSION=${VERSION:-dev}
    image: ghcr.io/hrygo/hotplex:latest
    container_name: hotplex
    ports:
      - "18080:8080"
    env_file:
      - .env
    <<: *hotplex-common

  # ---------------------------------------------------------
  # Bot 02: Secondary Bot (reuses built image)
  # env file: .env.secondary
  # ---------------------------------------------------------
  hotplex-secondary:
    image: ghcr.io/hrygo/hotplex:latest
    container_name: hotplex-secondary
    ports:
      - "18081:8080"
    env_file:
      - .env.secondary
    <<: *hotplex-common

# Named volumes for Go cache persistence
volumes:
  hotplex-go-mod:
    name: hotplex-go-mod
  hotplex-go-build:
    name: hotplex-go-build
