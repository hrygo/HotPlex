# ==============================================================================
# 🐳 HotPlex Docker Compose (1+n Architecture)
# ==============================================================================
# Quick Start:
#   make docker-up      # Start all bots
#   make docker-logs    # View logs
#   make docker-down    # Stop all bots
# ==============================================================================

# ------------------------------------------------------------------------------
# Architecture Overview
# ------------------------------------------------------------------------------
#   ┌─────────────────────────────────────────────────────────────────────────┐
#   │  Bot 01 (hotplex)          │  Bot 02 (hotplex-secondary)              │
#   │  ├─ .env                   │  ├─ .env.secondary                       │
#   │  ├─ Port: 18080            │  ├─ Port: 18081                          │
#   │  ├─ projects: BOT_U0A...   │  ├─ projects: BOT_U0A...  (独立目录)     │
#   │  └─ gitconfig: -hotplex    │  └─ gitconfig: -secondary  (独立配置)    │
#   └─────────────────────────────────────────────────────────────────────────┘
#                              │
#                    ┌─────────┴─────────┐
#                    │   Shared Resources │
#                    │   • ~/.hotplex     │  ← Message DB, configs
#                    │   • ~/.claude      │  ← Session state
#                    │   • Go cache       │  ← Named volumes
#                    └───────────────────┘

# ------------------------------------------------------------------------------
# 🛠️ Common Configurations (YAML Anchors)
# ------------------------------------------------------------------------------
x-hotplex-common: &hotplex-common
  image: ${HOTPLEX_IMAGE:-ghcr.io/hrygo/hotplex:latest}
  init: true # Proper PID 1 signal handling
  environment: &common-env
    HOST_UID: ${HOST_UID:-1000}
    # ─────────────────────────────────────────────────────────────────
    # Proxy Configuration (OPTIONAL)
    # ─────────────────────────────────────────────────────────────────
    # These settings are for users in China or behind a corporate proxy.
    # If you have direct internet access, comment out all 4 lines below.
    #
    # Requirements for proxy mode:
    #   1. Proxy software running on host (e.g., Clash, V2Ray)
    #   2. "Allow LAN" enabled in proxy software
    #   3. Ports match your proxy configuration (15721, 7897)
    # ─────────────────────────────────────────────────────────────────
    ANTHROPIC_BASE_URL: http://host.docker.internal:15721
    HTTP_PROXY: http://host.docker.internal:7897
    HTTPS_PROXY: http://host.docker.internal:7897
    NO_PROXY: localhost,127.0.0.1,host.docker.internal
    # ─────────────────────────────────────────────────────────────────
    # Git Identity Defaults
    # ─────────────────────────────────────────────────────────────────
    GIT_USER_NAME: ${GIT_USER_NAME:-HotPlexBot}
    GIT_USER_EMAIL: ${GIT_USER_EMAIL:-noreply@hotplex.dev}
  extra_hosts:
    - "host.docker.internal:host-gateway" # Allows container to reach host
  # ─────────────────────────────────────────────────────────────────
  # Security Hardening
  # ─────────────────────────────────────────────────────────────────
  cap_drop:
    - NET_RAW
    - NET_ADMIN
  security_opt:
    - no-new-privileges:true
  healthcheck: &common-healthcheck
    test: [ "CMD", "wget", "-q", "--spider", "http://localhost:8080/health" ]
    interval: 30s
    timeout: 10s
    retries: 3
    start_period: 60s # Grace period for slow startup
  logging: &common-logging
    driver: json-file
    options:
      max-size: "10m"
      max-file: "3"
  deploy: &common-deploy
    resources:
      limits:
        memory: 2G
        cpus: '2.0'
      reservations:
        memory: 512M
        cpus: '0.25'
  restart: unless-stopped

# ------------------------------------------------------------------------------
# Named Volumes
# Persist Go build cache across container restarts (shared by all bots)
# ------------------------------------------------------------------------------
volumes:
  hotplex-go-mod:
    name: hotplex-go-mod
  hotplex-go-build:
    name: hotplex-go-build

services:
  # ============================================================================
  # Bot 01: Primary Bot (U0AHRCL1KCM)
  # ============================================================================
  hotplex:
    <<: *hotplex-common
    container_name: hotplex
    ports:
      - "127.0.0.1:18080:8080"
    environment:
      # Override data root for container isolation, mapped to instance-specific host path
      HOTPLEX_DATA_ROOT: /home/hotplex/.hotplex
      # Align with the volume mount point below
      HOTPLEX_PROJECTS_DIR: /home/hotplex/projects
      HOTPLEX_MESSAGE_STORE_SQLITE_PATH: /home/hotplex/.hotplex/chatapp_messages.db
    env_file:
      - .env
    volumes:
      # Instance Isolation: Host Dir → Container Standard Dir
      - ${HOME}/.hotplex/instances/U0AHRCL1KCM/storage:/home/hotplex/.hotplex:rw
      - ${HOME}/.hotplex/instances/U0AHRCL1KCM/claude:/home/hotplex/.claude:rw
      - ${HOME}/.hotplex/instances/U0AHRCL1KCM/projects:/home/hotplex/projects:rw
      # Claude Seed: Host Standard Dir → Container Read-Only Seed
      - ${HOME}/.claude:/home/hotplex/.claude_seed:ro
      # Build Cache (Shared for efficiency)
      - hotplex-go-mod:/home/hotplex/go/pkg/mod:rw
      - hotplex-go-build:/home/hotplex/.cache/go-build:rw
    labels:
      - "hotplex.bot.id=U0AHRCL1KCM"
      - "hotplex.bot.role=primary"

  # ============================================================================
  # Bot 02: Secondary Bot (U0AJVRH4YF6)
  # ============================================================================
  hotplex-secondary:
    <<: *hotplex-common
    container_name: hotplex-secondary
    ports:
      - "127.0.0.1:18081:8080"
    environment:
      HOTPLEX_DATA_ROOT: /home/hotplex/.hotplex
      HOTPLEX_PROJECTS_DIR: /home/hotplex/projects
      HOTPLEX_MESSAGE_STORE_SQLITE_PATH: /home/hotplex/.hotplex/chatapp_messages.db
    env_file:
      - .env.secondary
    volumes:
      # Instance Isolation: Host Dir → Container Standard Dir
      - ${HOME}/.hotplex/instances/U0AJVRH4YF6/storage:/home/hotplex/.hotplex:rw
      - ${HOME}/.hotplex/instances/U0AJVRH4YF6/claude:/home/hotplex/.claude:rw
      - ${HOME}/.hotplex/instances/U0AJVRH4YF6/projects:/home/hotplex/projects:rw
      # Claude Seed: Host Standard Dir → Container Read-Only Seed
      - ${HOME}/.claude:/home/hotplex/.claude_seed:ro
      # Build Cache (Shared for efficiency)
      - hotplex-go-mod:/home/hotplex/go/pkg/mod:rw
      - hotplex-go-build:/home/hotplex/.cache/go-build:rw
    labels:
      - "hotplex.bot.id=U0AJVRH4YF6"
      - "hotplex.bot.role=secondary"
